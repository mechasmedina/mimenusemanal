<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mi Menú Semanal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F6F2;
  --surface: #FFFFFF;
  --card: #F2EFE9;
  --card-hover: #EAE6DE;
  --border: #E2DDD5;
  --border-dark: #CCC6BB;
  --sage: #4F7E52;
  --sage-light: #EBF3EB;
  --sage-mid: #6FA372;
  --mint: #2D5E30;
  --terracotta: #B85C3C;
  --terra-light: #FBF0EC;
  --gold: #9A6E20;
  --text: #1A221B;
  --text-mid: #627065;
  --text-dim: #A0ACA2;
  --breakfast: #9A6E20;
  --breakfast-bg: #FBF4E6;
  --snack: #4F7E52;
  --snack-bg: #EBF3EB;
  --lunch: #2E6E96;
  --lunch-bg: #E8F2F8;
  --dinner: #6A4A90;
  --dinner-bg: #F0EBF8;
  --shadow-sm: 0 1px 6px rgba(0,0,0,0.06);
  --shadow: 0 2px 14px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); font-family:'Outfit',sans-serif; color:var(--text); min-height:100vh; overflow-x:hidden; }

/* ── HEADER ── */
.header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 16px 0;
  position:sticky; top:0; z-index:100;
  box-shadow:var(--shadow-sm);
}
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.app-title { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--mint); }
.app-title span { display:block; font-size:10px; font-family:'Outfit',sans-serif; font-weight:500; color:var(--text-dim); letter-spacing:2.5px; text-transform:uppercase; margin-bottom:2px; }
.week-nav { display:flex; align-items:center; gap:6px; }
.week-btn { width:30px; height:30px; border-radius:8px; background:var(--card); border:1px solid var(--border); color:var(--text-mid); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all 0.15s; }
.week-btn:active { background:var(--card-hover); }
.week-label { font-size:11px; color:var(--text-mid); font-weight:500; min-width:68px; text-align:center; }

.day-tabs { display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; }
.day-tabs::-webkit-scrollbar { display:none; }
.day-tab { flex-shrink:0; padding:7px 11px; border-radius:10px 10px 0 0; border:1px solid transparent; border-bottom:none; background:transparent; color:var(--text-dim); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:3px; }
.day-tab.active { background:var(--bg); border-color:var(--border); color:var(--mint); font-weight:600; }
.day-dot { width:5px; height:5px; border-radius:50%; background:var(--terracotta); opacity:0; transition:opacity 0.2s; }
.day-tab.has-meals .day-dot { opacity:1; }

/* ── LAYOUT ── */
.app-body { display:flex; height:calc(100vh - 128px); }

/* ── SIDEBAR ── */
.sidebar { width:205px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:12px 12px 8px; border-bottom:1px solid var(--border); }
.sidebar-title { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); margin-bottom:8px; font-weight:600; }
.filter-pills { display:flex; flex-wrap:wrap; gap:4px; }
.filter-pill { padding:3px 8px; border-radius:20px; font-size:10px; cursor:pointer; border:1px solid var(--border); transition:all 0.15s; font-weight:500; background:var(--card); color:var(--text-mid); }
.filter-pill.active { opacity:1; }
.filter-pill:not(.active) { opacity:0.35; }
.filter-pill[data-filter="desayuno"].active { background:var(--breakfast-bg); color:var(--breakfast); border-color:#D4B070; }
.filter-pill[data-filter="colacion"].active { background:var(--snack-bg); color:var(--snack); border-color:#90C494; }
.filter-pill[data-filter="comida"].active { background:var(--lunch-bg); color:var(--lunch); border-color:#80B4D0; }
.filter-pill[data-filter="cena"].active { background:var(--dinner-bg); color:var(--dinner); border-color:#A890C8; }
.search-box { margin:8px 12px 4px; position:relative; }
.search-box input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:6px 10px 6px 26px; color:var(--text); font-size:11px; font-family:'Outfit',sans-serif; outline:none; transition:border-color 0.2s; }
.search-box input:focus { border-color:var(--sage-mid); }
.search-box input::placeholder { color:var(--text-dim); }
.search-icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:11px; }
.recipe-bank { flex:1; overflow-y:auto; padding:8px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

.recipe-chip { padding:9px 10px; border-radius:10px; background:var(--surface); border:1px solid var(--border); margin-bottom:5px; cursor:grab; transition:all 0.18s; user-select:none; box-shadow:var(--shadow-sm); position:relative; }
.recipe-chip:active { cursor:grabbing; opacity:0.6; }
.recipe-chip:hover { border-color:var(--sage-mid); box-shadow:var(--shadow); }
.recipe-chip.dragging { opacity:0.25; }
.chip-name { font-size:11px; color:var(--text); line-height:1.3; margin-bottom:3px; }
.chip-cat { font-size:9px; font-weight:600; letter-spacing:0.3px; text-transform:uppercase; }
.chip-cat.desayuno { color:var(--breakfast); }
.chip-cat.colacion { color:var(--snack); }
.chip-cat.comida { color:var(--lunch); }
.chip-cat.cena { color:var(--dinner); }
.chip-eye { position:absolute; top:8px; right:8px; font-size:12px; opacity:0; transition:opacity 0.2s; cursor:pointer; }
.recipe-chip:hover .chip-eye { opacity:1; }

/* ── PLANNER ── */
.planner { flex:1; overflow-y:auto; padding:14px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.day-view { display:none; }
.day-view.active { display:block; animation:fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.day-progress { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow-sm); }
.progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.progress-title { font-size:13px; font-weight:600; color:var(--text); }
.progress-pct { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--sage); font-weight:600; }
.progress-track { height:5px; background:var(--card); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--sage-mid),var(--mint)); border-radius:3px; transition:width 0.4s ease; }
.mini-stats { display:flex; gap:8px; margin-top:10px; }
.mini-stat { flex:1; background:var(--card); border-radius:10px; padding:7px 8px; text-align:center; }
.mini-stat-num { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--text); line-height:1; font-weight:600; }
.mini-stat-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }

.meal-slot { background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden; box-shadow:var(--shadow-sm); transition:border-color 0.2s,box-shadow 0.2s; }
.meal-slot.drag-over { border-color:var(--sage-mid); box-shadow:0 0 0 3px var(--sage-light); }
.slot-header { display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--border); }
.slot-badge { padding:3px 9px; border-radius:20px; font-size:10px; font-weight:600; }
.slot-badge.desayuno { background:var(--breakfast-bg); color:var(--breakfast); }
.slot-badge.colacion { background:var(--snack-bg); color:var(--snack); }
.slot-badge.comida { background:var(--lunch-bg); color:var(--lunch); }
.slot-badge.cena { background:var(--dinner-bg); color:var(--dinner); }
.slot-time { font-size:10px; color:var(--text-dim); margin-left:auto; }
.slot-body { padding:10px; min-height:66px; }
.drop-hint { display:flex; align-items:center; justify-content:center; height:44px; border:1.5px dashed var(--border-dark); border-radius:10px; color:var(--text-dim); font-size:11px; gap:5px; transition:all 0.2s; }
.meal-slot.drag-over .drop-hint { border-color:var(--sage-mid); color:var(--sage); background:var(--sage-light); }

.placed-meal { display:flex; align-items:center; gap:8px; padding:9px 11px; background:var(--card); border-radius:10px; margin-bottom:6px; border:1px solid var(--border); transition:all 0.2s; animation:slideIn 0.22s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
.placed-meal.eaten { background:var(--snack-bg); border-color:#B8D8BA; }
.placed-meal.eaten .meal-text { text-decoration:line-through; color:var(--text-dim); }
.meal-check { width:22px; height:22px; border-radius:6px; border:1.5px solid var(--border-dark); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:11px; color:white; }
.placed-meal.eaten .meal-check { background:var(--sage); border-color:var(--sage); }
.meal-text { flex:1; font-size:12px; color:var(--text); line-height:1.3; cursor:pointer; }
.meal-text:hover { color:var(--mint); text-decoration:underline; }
.meal-info { width:22px; height:22px; border-radius:6px; background:transparent; border:none; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; transition:all 0.15s; }
.meal-info:active { background:var(--lunch-bg); color:var(--lunch); }
.meal-remove { width:22px; height:22px; border-radius:6px; background:transparent; border:none; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; line-height:1; flex-shrink:0; transition:all 0.15s; }
.meal-remove:active { background:var(--terra-light); color:var(--terracotta); }

/* ── WEEK OVERVIEW ── */
.week-overview { display:none; }
.week-overview.active { display:block; animation:fadeIn 0.25s ease; }
.week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.week-day-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 6px; cursor:pointer; transition:all 0.18s; min-height:110px; box-shadow:var(--shadow-sm); }
.week-day-card:active { transform:scale(0.97); border-color:var(--sage-mid); }
.week-day-name { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:7px; text-align:center; }
.week-meal-dot { width:6px; height:6px; border-radius:50%; margin:2px auto; }
.week-progress-mini { margin-top:8px; height:3px; background:var(--card); border-radius:2px; overflow:hidden; }
.week-progress-fill { height:100%; background:var(--sage); border-radius:2px; }
.week-day-count { font-size:9px; color:var(--text-dim); text-align:center; margin-top:4px; }

/* ── RECIPE MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500;
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border-radius:24px 24px 0 0;
  width:100%; max-width:560px; max-height:88vh;
  overflow-y:auto; scrollbar-width:thin;
  padding:0 0 32px;
  transform:translateY(40px); transition:transform 0.3s ease;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:14px auto 0; }
.modal-header { padding:16px 20px 12px; border-bottom:1px solid var(--border); }
.modal-cat { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.modal-cat.desayuno { color:var(--breakfast); }
.modal-cat.colacion { color:var(--snack); }
.modal-cat.comida { color:var(--lunch); }
.modal-cat.cena { color:var(--dinner); }
.modal-title { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--mint); line-height:1.2; }
.modal-close { position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; background:var(--card); border:none; cursor:pointer; font-size:18px; color:var(--text-mid); display:flex; align-items:center; justify-content:center; }
.modal-section { padding:16px 20px 0; }
.modal-section-title { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); font-weight:600; margin-bottom:10px; }
.ingredient-list { display:flex; flex-direction:column; gap:6px; }
.ingredient-item { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--card); border-radius:10px; }
.ingredient-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.ingredient-dot.desayuno { background:var(--breakfast); }
.ingredient-dot.colacion { background:var(--snack); }
.ingredient-dot.comida { background:var(--lunch); }
.ingredient-dot.cena { background:var(--dinner); }
.ingredient-text { font-size:13px; color:var(--text); }
.step-list { display:flex; flex-direction:column; gap:8px; }
.step-item { display:flex; gap:12px; }
.step-num { width:24px; height:24px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:white; margin-top:1px; }
.step-num.desayuno { background:var(--breakfast); }
.step-num.colacion { background:var(--snack); }
.step-num.comida { background:var(--lunch); }
.step-num.cena { background:var(--dinner); }
.step-text { font-size:13px; color:var(--text); line-height:1.5; padding-top:3px; }
.modal-add-btn { margin:20px 20px 0; width:calc(100% - 40px); padding:14px; background:var(--sage); color:white; border:none; border-radius:12px; font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.modal-add-btn:active { background:var(--mint); transform:scale(0.98); }

/* ── MOBILE DRAWER ── */
.drawer-toggle { display:none; position:fixed; bottom:20px; right:20px; width:52px; height:52px; border-radius:50%; background:var(--sage); border:none; color:white; font-size:22px; cursor:pointer; box-shadow:0 4px 20px rgba(79,126,82,0.4); z-index:200; align-items:center; justify-content:center; transition:all 0.2s; }
.drawer-toggle:active { transform:scale(0.95); }
.drawer { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); border-radius:22px 22px 0 0; z-index:300; max-height:72vh; transform:translateY(100%); transition:transform 0.3s ease; padding:0 14px 24px; box-shadow:var(--shadow-lg); }
.drawer.open { transform:translateY(0); }
.drawer-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 14px; }
.drawer-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.drawer-search { flex:1; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:7px 10px 7px 26px; color:var(--text); font-size:12px; font-family:'Outfit',sans-serif; outline:none; }
.drawer-search-wrap { position:relative; flex:1; }
.drawer-search-icon { position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:12px; }
.drawer-filter-row { display:flex; gap:5px; margin-bottom:10px; overflow-x:auto; scrollbar-width:none; }
.drawer-filter-row::-webkit-scrollbar { display:none; }
.drawer-chips { display:grid; grid-template-columns:1fr 1fr; gap:6px; max-height:52vh; overflow-y:auto; padding-bottom:4px; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:250; }
.overlay.open { display:block; }

/* TOAST */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--mint); color:white; padding:10px 18px; border-radius:20px; font-size:13px; font-weight:600; opacity:0; transition:all 0.3s; z-index:600; white-space:nowrap; box-shadow:var(--shadow); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* RESPONSIVE */
@media (max-width:640px) {
  .sidebar { display:none; }
  .drawer-toggle { display:flex; }
  .drawer { display:block; }
  .week-grid { grid-template-columns:repeat(3,1fr); }
  .app-body { height:calc(100vh - 120px); }
}
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">
      <span>Planeador</span>
      Mi Menú Semanal
    </div>
    <div class="week-nav">
      <button class="week-btn" onclick="changeWeek(-1)">‹</button>
      <span class="week-label" id="weekLabel">Esta semana</span>
      <button class="week-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</div>

<div class="app-body">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Recetas — toca 👁 para ver</div>
      <div class="filter-pills" id="filterPills">
        <div class="filter-pill active" data-filter="all" onclick="setFilter('all')">Todas</div>
        <div class="filter-pill active" data-filter="desayuno" onclick="setFilter('desayuno')">☀️</div>
        <div class="filter-pill active" data-filter="colacion" onclick="setFilter('colacion')">🍎</div>
        <div class="filter-pill active" data-filter="comida" onclick="setFilter('comida')">🥗</div>
        <div class="filter-pill active" data-filter="cena" onclick="setFilter('cena')">🌙</div>
      </div>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Buscar receta..." id="searchInput" oninput="filterRecipes()">
    </div>
    <div class="recipe-bank" id="recipeBankDesktop"></div>
  </div>

  <div class="planner" id="plannerArea"></div>
</div>

<!-- Mobile -->
<button class="drawer-toggle" onclick="toggleDrawer()">🍽️</button>
<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-top">
    <div class="drawer-search-wrap">
      <span class="drawer-search-icon">🔍</span>
      <input class="drawer-search" type="text" placeholder="Buscar receta..." oninput="filterRecipes(this.value)">
    </div>
  </div>
  <div class="drawer-filter-row" id="drawerFilters">
    <div class="filter-pill active" data-filter="all" onclick="setFilter('all',true)">Todas</div>
    <div class="filter-pill active" data-filter="desayuno" onclick="setFilter('desayuno',true)">☀️ Desayuno</div>
    <div class="filter-pill active" data-filter="colacion" onclick="setFilter('colacion',true)">🍎 Colación</div>
    <div class="filter-pill active" data-filter="comida" onclick="setFilter('comida',true)">🥗 Comida</div>
    <div class="filter-pill active" data-filter="cena" onclick="setFilter('cena',true)">🌙 Cena</div>
  </div>
  <div class="drawer-chips" id="recipeBankMobile"></div>
</div>

<!-- Recipe Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="recipeModal">
    <div class="modal-handle"></div>
    <div style="position:relative">
      <div class="modal-header">
        <div class="modal-cat" id="modalCat"></div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Ingredientes</div>
      <div class="ingredient-list" id="modalIngredients"></div>
    </div>
    <div class="modal-section" style="margin-top:14px">
      <div class="modal-section-title">Preparación</div>
      <div class="step-list" id="modalSteps"></div>
    </div>
    <button class="modal-add-btn" id="modalAddBtn">＋ Agregar a mi menú del día</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── RECIPES DATA ──────────────────────────────────────
const RECIPES = [
  {id:'d1', name:'Smoothie Verde', cat:'desayuno',
   ingredients:['1 tza leche de almendra','1/2 plátano','2 tzas espinaca','3 nueces'],
   steps:['Licúa todos los ingredientes hasta obtener una mezcla homogénea.','Sirve inmediatamente.']},
  {id:'d2', name:'Smoothie Guayaba Colada', cat:'desayuno',
   ingredients:['1 tza leche de coco','2 guayabas sin semillas','1 cda coco rallado'],
   steps:['Licúa todos los ingredientes.','Sirve frío.']},
  {id:'d3', name:'Smoothie Durazno', cat:'desayuno',
   ingredients:['1 tza leche de avena','1 durazno mediano','3 nueces','2 cdas amaranto'],

const SLOTS = [
  {key:'desayuno', label:'Desayuno', time:'7–9 AM'},
  {key:'colacion', label:'Colación AM', time:'10–11 AM'},
  {key:'comida', label:'Comida', time:'1–3 PM'},
  {key:'colacion2', label:'Colación PM', time:'4–5 PM'},
  {key:'cena', label:'Cena', time:'7–8 PM'},
];

const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const FULL_DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let currentDay = 0;
let currentWeekOffset = 0;
let activeFilter = 'all';
let dragItem = null;
let currentModalRecipe = null;
const plan = {};

function getWeekKey(){ return `w${currentWeekOffset}`; }
function getDayPlan(day){ const wk=getWeekKey(); if(!plan[wk])plan[wk]={}; if(!plan[wk][day])plan[wk][day]={}; return plan[wk][day]; }
function savePlan(){ try{localStorage.setItem('menuPlanV2',JSON.stringify(plan));}catch(e){} }
function loadPlan(){ try{const s=localStorage.getItem('menuPlanV2');if(s)Object.assign(plan,JSON.parse(s));}catch(e){} }

loadPlan();
buildTabs();
buildPlanner();
buildRecipeBank();
updateWeekLabel();

function buildTabs(){
  const tabs=document.getElementById('dayTabs');
  tabs.innerHTML='';
  const ov=document.createElement('div');
  ov.className='day-tab'+(currentDay===-1?' active':'');
  ov.innerHTML='📅 Semana';
  ov.onclick=()=>selectDay(-1);
  tabs.appendChild(ov);
  DAYS.forEach((d,i)=>{
    const tab=document.createElement('div');
    tab.className='day-tab'+(currentDay===i?' active':'');
    tab.id=`tab-${i}`;
    tab.innerHTML=`<div class="day-dot"></div><span>${d}</span>`;
    tab.onclick=()=>selectDay(i);
    tabs.appendChild(tab);
    updateTabDot(i);
  });
}

function updateTabDot(i){
  const tab=document.getElementById(`tab-${i}`);
  if(!tab)return;
  const dp=getDayPlan(i);
  const has=SLOTS.some(s=>(dp[s.key]||[]).length>0);
  tab.classList.toggle('has-meals',has);
}

function selectDay(idx){
  currentDay=idx;
  buildTabs();
  document.querySelectorAll('.day-view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.week-overview').forEach(e=>e.classList.remove('active'));
  if(idx===-1){ document.getElementById('weekOverview').classList.add('active'); buildWeekOverview(); }
  else{ const dv=document.getElementById(`day-${idx}`); if(dv)dv.classList.add('active'); updateDayProgress(idx); }
}

function buildPlanner(){
  const area=document.getElementById('plannerArea');
  area.innerHTML='';
  const wo=document.createElement('div');
  wo.className='week-overview'+(currentDay===-1?' active':'');
  wo.id='weekOverview';
  area.appendChild(wo);
  DAYS.forEach((d,i)=>{
    const view=document.createElement('div');
    view.className='day-view'+(currentDay===i?' active':'');
    view.id=`day-${i}`;
    // progress
    const prog=document.createElement('div');
    prog.className='day-progress';
    prog.innerHTML=`<div class="progress-row"><span class="progress-title">${FULL_DAYS[i]}</span><span class="progress-pct" id="pct-${i}">0%</span></div><div class="progress-track"><div class="progress-fill" id="pfill-${i}" style="width:0%"></div></div><div class="mini-stats"><div class="mini-stat"><div class="mini-stat-num" id="stt-${i}">0</div><div class="mini-stat-label">Planeadas</div></div><div class="mini-stat"><div class="mini-stat-num" id="ste-${i}">0</div><div class="mini-stat-label">Comidas ✓</div></div><div class="mini-stat"><div class="mini-stat-num" id="stp-${i}">0</div><div class="mini-stat-label">Pendientes</div></div></div>`;
    view.appendChild(prog);
    SLOTS.forEach(slot=>{
      const slotEl=document.createElement('div');
      slotEl.className='meal-slot';
      slotEl.dataset.day=i;
      slotEl.dataset.slot=slot.key;
      const catClass=slot.key.replace('2','');
      slotEl.innerHTML=`<div class="slot-header"><div class="slot-badge ${catClass}">${slot.label}</div><div class="slot-time">${slot.time}</div></div><div class="slot-body" id="slot-${i}-${slot.key}"><div class="drop-hint">＋ Arrastra una receta aquí</div></div>`;
      slotEl.addEventListener('dragover',e=>{e.preventDefault();slotEl.classList.add('drag-over');});
      slotEl.addEventListener('dragleave',()=>slotEl.classList.remove('drag-over'));
      slotEl.addEventListener('drop',e=>{e.preventDefault();slotEl.classList.remove('drag-over');handleDrop(i,slot.key);});
      slotEl.addEventListener('touchend',e=>handleTouchDrop(e,i,slot.key),{passive:false});
      view.appendChild(slotEl);
    });
    area.appendChild(view);
    renderDaySlots(i);
  });
}

function buildRecipeBank(searchTerm=''){
  renderBank('recipeBankDesktop',false,searchTerm);
  renderBank('recipeBankMobile',true,searchTerm);
}

function renderBank(containerId,mobile,searchTerm=''){
  const container=document.getElementById(containerId);
  if(!container)return;
  container.innerHTML='';
  const search=(searchTerm||document.getElementById('searchInput')?.value||'').toLowerCase();
  const filtered=RECIPES.filter(r=>{
    const matchCat=activeFilter==='all'||r.cat===activeFilter;
    const matchSearch=r.name.toLowerCase().includes(search);
    return matchCat&&matchSearch;
  });
  filtered.forEach(recipe=>{
    const chip=document.createElement('div');
    chip.className='recipe-chip';
    chip.draggable=true;
    chip.dataset.id=recipe.id;
    chip.dataset.name=recipe.name;
    chip.dataset.cat=recipe.cat;
    chip.innerHTML=`<div class="chip-eye" onclick="openModal('${recipe.id}',event)">👁</div><div class="chip-name">${recipe.name}</div><div class="chip-cat ${recipe.cat}">${catLabel(recipe.cat)}</div>`;
    chip.addEventListener('dragstart',e=>{dragItem={name:recipe.name,cat:recipe.cat};chip.classList.add('dragging');e.dataTransfer.effectAllowed='copy';});
    chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
    chip.addEventListener('touchstart',handleTouchStart,{passive:true});
    chip.addEventListener('touchmove',handleTouchMove,{passive:false});
    // tap to open modal on mobile
    let tapTimer;
    chip.addEventListener('touchend',e=>{
      clearTimeout(tapTimer);
      tapTimer=setTimeout(()=>{
        if(!touchDragItem||!touchMoved) openModal(recipe.id,e);
        touchMoved=false; touchDragItem=null;
      },50);
    });
    container.appendChild(chip);
  });
}

function catLabel(cat){ return {desayuno:'☀️ Desayuno',colacion:'🍎 Colación',comida:'🥗 Comida',cena:'🌙 Cena'}[cat]||cat; }

// ── DRAG ──
function handleDrop(dayIdx,slotKey){ if(!dragItem)return; addMealToSlot(dayIdx,slotKey,dragItem.name); dragItem=null; if(document.getElementById('drawer').classList.contains('open'))toggleDrawer(); }
let touchDragItem=null, touchGhost=null, touchMoved=false;
function handleTouchStart(e){ const chip=e.currentTarget; touchDragItem={name:chip.dataset.name,cat:chip.dataset.cat}; touchMoved=false; }
function handleTouchMove(e){ e.preventDefault(); touchMoved=true; const touch=e.touches[0]; if(!touchGhost){touchGhost=document.createElement('div');touchGhost.style.cssText='position:fixed;z-index:9999;background:var(--sage);color:white;padding:8px 12px;border-radius:10px;font-size:12px;font-weight:600;pointer-events:none;max-width:160px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.2);';touchGhost.textContent=touchDragItem?.name||'';document.body.appendChild(touchGhost);} touchGhost.style.left=(touch.clientX-80)+'px'; touchGhost.style.top=(touch.clientY-24)+'px'; }
function handleTouchDrop(e,dayIdx,slotKey){ if(touchGhost){touchGhost.remove();touchGhost=null;} if(!touchDragItem||!touchMoved)return; addMealToSlot(dayIdx,slotKey,touchDragItem.name); touchDragItem=null; touchMoved=false; if(document.getElementById('drawer').classList.contains('open'))toggleDrawer(); }
document.addEventListener('touchend',()=>{if(touchGhost){touchGhost.remove();touchGhost=null;}});

// ── MEALS ──
function addMealToSlot(dayIdx,slotKey,mealName){
  const dp=getDayPlan(dayIdx);
  if(!dp[slotKey])dp[slotKey]=[];
  if(dp[slotKey].find(m=>m.name===mealName)){showToast('Ya está en este tiempo 👀');return;}
  dp[slotKey].push({name:mealName,eaten:false});
  savePlan();
  renderDaySlots(dayIdx);
  updateDayProgress(dayIdx);
  updateTabDot(dayIdx);
  showToast('✓ Agregado al menú');
}

function toggleEaten(dayIdx,slotKey,mealIdx){
  const dp=getDayPlan(dayIdx);
  if(!dp[slotKey]||!dp[slotKey][mealIdx])return;
  dp[slotKey][mealIdx].eaten=!dp[slotKey][mealIdx].eaten;
  savePlan(); renderDaySlots(dayIdx); updateDayProgress(dayIdx);
}

function removeMeal(dayIdx,slotKey,mealIdx){
  const dp=getDayPlan(dayIdx);
  if(!dp[slotKey])return;
  dp[slotKey].splice(mealIdx,1);
  savePlan(); renderDaySlots(dayIdx); updateDayProgress(dayIdx); updateTabDot(dayIdx);
}

function renderDaySlots(dayIdx){
  const dp=getDayPlan(dayIdx);
  SLOTS.forEach(slot=>{
    const body=document.getElementById(`slot-${dayIdx}-${slot.key}`);
    if(!body)return;
    const meals=dp[slot.key]||[];
    if(meals.length===0){
      body.innerHTML='<div class="drop-hint">＋ Arrastra una receta aquí</div>';
    } else {
      body.innerHTML=meals.map((m,idx)=>`
        <div class="placed-meal ${m.eaten?'eaten':''}">
          <button class="meal-check" onclick="toggleEaten(${dayIdx},'${slot.key}',${idx})">${m.eaten?'✓':''}</button>
          <div class="meal-text" onclick="openModalByName('${m.name.replace(/'/g,"\\'")}')">${m.name}</div>
          <button class="meal-info" onclick="openModalByName('${m.name.replace(/'/g,"\\'")}')">📋</button>
          <button class="meal-remove" onclick="removeMeal(${dayIdx},'${slot.key}',${idx})">×</button>
        </div>`).join('')+
        '<div class="drop-hint" style="margin-top:6px;height:36px;font-size:10px">＋ agregar otro</div>';
    }
  });
}

function updateDayProgress(dayIdx){
  const dp=getDayPlan(dayIdx);
  let total=0,eaten=0;
  SLOTS.forEach(s=>{const m=dp[s.key]||[];total+=m.length;eaten+=m.filter(x=>x.eaten).length;});
  const pct=total===0?0:Math.round((eaten/total)*100);
  const pctEl=document.getElementById(`pct-${dayIdx}`);
  const fillEl=document.getElementById(`pfill-${dayIdx}`);
  if(pctEl)pctEl.textContent=pct+'%';
  if(fillEl)fillEl.style.width=pct+'%';
  ['stt','ste','stp'].forEach((id,i)=>{const el=document.getElementById(`${id}-${dayIdx}`);if(el)el.textContent=[total,eaten,total-eaten][i];});
}

// ── WEEK OVERVIEW ──
function buildWeekOverview(){
  const wo=document.getElementById('weekOverview');
  wo.innerHTML='<div class="week-grid" id="weekGrid"></div>';
  const grid=document.getElementById('weekGrid');
  DAYS.forEach((d,i)=>{
    const dp=getDayPlan(i);
    let total=0,eaten=0;
    SLOTS.forEach(s=>{const m=dp[s.key]||[];total+=m.length;eaten+=m.filter(x=>x.eaten).length;});
    const pct=total===0?0:Math.round((eaten/total)*100);
    const card=document.createElement('div');
    card.className='week-day-card';
    card.onclick=()=>selectDay(i);
    let dots='';
    const colors={desayuno:'var(--breakfast)',colacion:'var(--snack)',comida:'var(--lunch)',colacion2:'var(--snack)',cena:'var(--dinner)'};
    SLOTS.forEach(s=>{if((dp[s.key]||[]).length>0)dots+=`<div class="week-meal-dot" style="background:${colors[s.key]}"></div>`;});
    card.innerHTML=`<div class="week-day-name">${d}</div>${dots||'<div style="font-size:9px;color:var(--text-dim);text-align:center">Sin planear</div>'}<div class="week-progress-mini"><div class="week-progress-fill" style="width:${pct}%"></div></div><div class="week-day-count">${total} recetas</div>`;
    grid.appendChild(card);
  });
}

// ── MODAL ──
function openModal(recipeId,e){
  if(e){e.stopPropagation();e.preventDefault();}
  const recipe=RECIPES.find(r=>r.id===recipeId);
  if(!recipe)return;
  showRecipeModal(recipe);
}

function openModalByName(name){
  const recipe=RECIPES.find(r=>r.name===name);
  if(!recipe)return;
  showRecipeModal(recipe);
}

function showRecipeModal(recipe){
  currentModalRecipe=recipe;
  document.getElementById('modalCat').textContent=catLabel(recipe.cat);
  document.getElementById('modalCat').className='modal-cat '+recipe.cat;
  document.getElementById('modalTitle').textContent=recipe.name;
  document.getElementById('modalIngredients').innerHTML=recipe.ingredients.map(ing=>`<div class="ingredient-item"><div class="ingredient-dot ${recipe.cat}"></div><div class="ingredient-text">${ing}</div></div>`).join('');
  document.getElementById('modalSteps').innerHTML=recipe.steps.map((s,i)=>`<div class="step-item"><div class="step-num ${recipe.cat}">${i+1}</div><div class="step-text">${s}</div></div>`).join('');
  const addBtn=document.getElementById('modalAddBtn');
  addBtn.onclick=()=>addFromModal();
  document.getElementById('modalOverlay').classList.add('open');
}

function addFromModal(){
  if(!currentModalRecipe)return;
  if(currentDay<0){showToast('Selecciona un día primero');return;}
  const slotMap={desayuno:'desayuno',colacion:'colacion',comida:'comida',cena:'cena'};
  const slotKey=slotMap[currentModalRecipe.cat]||'desayuno';
  addMealToSlot(currentDay,slotKey,currentModalRecipe.name);
  closeModalDirect();
}

function closeModal(e){ if(e.target===document.getElementById('modalOverlay'))closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalOverlay').classList.remove('open'); }

// ── FILTERS ──
function setFilter(filter,mobile=false){
  activeFilter=filter;
  ['filterPills','drawerFilters'].forEach(id=>{
    const pills=document.getElementById(id);
    if(!pills)return;
    pills.querySelectorAll('.filter-pill').forEach(p=>{p.classList.toggle('active',p.dataset.filter===filter||filter==='all');});
  });
  buildRecipeBank();
}

function filterRecipes(val){
  buildRecipeBank(val||'');
}

// ── WEEK NAV ──
function changeWeek(dir){ currentWeekOffset+=dir; updateWeekLabel(); buildTabs(); buildPlanner(); }
function updateWeekLabel(){
  const el=document.getElementById('weekLabel');
  if(currentWeekOffset===0)el.textContent='Esta semana';
  else if(currentWeekOffset===1)el.textContent='Próx. semana';
  else if(currentWeekOffset===-1)el.textContent='Sem. pasada';
  else el.textContent=`Semana ${currentWeekOffset>0?'+':''}${currentWeekOffset}`;
}

// ── DRAWER ──
function toggleDrawer(){
  const drawer=document.getElementById('drawer');
  const overlay=document.getElementById('overlay');
  drawer.classList.toggle('open');
  overlay.classList.toggle('open');
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
</script>
