<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mis Recetas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F6F2;
  --surface: #FFFFFF;
  --card: #F2EFE9;
  --border: #E2DDD5;
  --border-dark: #CCC6BB;
  --sage: #4F7E52;
  --sage-light: #EBF3EB;
  --sage-mid: #6FA372;
  --mint: #2D5E30;
  --text: #1A221B;
  --text-mid: #627065;
  --text-dim: #A0ACA2;
  --shadow-sm: 0 1px 6px rgba(0,0,0,0.06);
  --shadow: 0 2px 14px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);

  /* Category colors */
  --batido: #2E7D9A;       --batido-bg: #E8F4F8;     --batido-border: #80C4D8;
  --complemento: #9A6E20;  --complemento-bg: #FBF4E6; --complemento-border: #D4B070;
  --colacion: #4F7E52;     --colacion-bg: #EBF3EB;    --colacion-border: #90C494;
  --comida: #7A4A00;       --comida-bg: #FDF0E0;      --comida-border: #D4946A;
  --cena: #6A4A90;         --cena-bg: #F0EBF8;        --cena-border: #A890C8;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body { background:var(--bg); font-family:'Outfit',sans-serif; color:var(--text); }

/* ── HEADER ── */
.header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:18px 20px 16px;
  position:sticky; top:0; z-index:100;
  box-shadow:var(--shadow-sm);
}

.header-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}

.app-title {
  font-family:'Cormorant Garamond',serif;
  font-size:24px; color:var(--mint);
}
.app-title span {
  display:block; font-size:10px; font-family:'Outfit',sans-serif;
  font-weight:500; color:var(--text-dim); letter-spacing:2.5px;
  text-transform:uppercase; margin-bottom:3px;
}

.header-count {
  font-size:11px; color:var(--text-dim); font-weight:500;
  background:var(--card); border:1px solid var(--border);
  padding:4px 10px; border-radius:20px;
}

/* Search */
.search-wrap {
  position:relative; margin-bottom:12px;
}
.search-wrap input {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:10px 16px 10px 38px;
  color:var(--text); font-size:14px; font-family:'Outfit',sans-serif;
  outline:none; transition:border-color 0.2s;
}
.search-wrap input:focus { border-color:var(--sage-mid); background:white; }
.search-wrap input::placeholder { color:var(--text-dim); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:15px; }
.search-clear {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--text-dim); font-size:18px;
  cursor:pointer; display:none; line-height:1;
}
.search-clear.visible { display:block; }

/* Category tabs */
.cat-tabs {
  display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;
}
.cat-tabs::-webkit-scrollbar { display:none; }

.cat-tab {
  flex-shrink:0; padding:7px 14px; border-radius:20px;
  border:1.5px solid var(--border); background:var(--surface);
  font-size:12px; font-weight:500; cursor:pointer;
  transition:all 0.2s; color:var(--text-mid);
  display:flex; align-items:center; gap:5px;
}
.cat-tab:active { transform:scale(0.96); }
.cat-tab.active[data-cat="all"]          { background:#1A221B; color:white; border-color:#1A221B; }
.cat-tab.active[data-cat="batido"]       { background:var(--batido-bg); color:var(--batido); border-color:var(--batido-border); }
.cat-tab.active[data-cat="complemento"] { background:var(--complemento-bg); color:var(--complemento); border-color:var(--complemento-border); }
.cat-tab.active[data-cat="colacion"]     { background:var(--colacion-bg); color:var(--colacion); border-color:var(--colacion-border); }
.cat-tab.active[data-cat="comida"]       { background:var(--comida-bg); color:var(--comida); border-color:var(--comida-border); }
.cat-tab.active[data-cat="cena"]         { background:var(--cena-bg); color:var(--cena); border-color:var(--cena-border); }

/* ── CONTENT ── */
.content { padding:16px; max-width:700px; margin:0 auto; padding-bottom:80px; }

/* Section headers */
.section-header {
  display:flex; align-items:center; gap:10px;
  margin:20px 0 12px;
}
.section-header:first-child { margin-top:4px; }

.section-badge {
  padding:5px 14px; border-radius:20px;
  font-size:12px; font-weight:600; letter-spacing:0.3px;
}
.section-badge.batido       { background:var(--batido-bg); color:var(--batido); border:1.5px solid var(--batido-border); }
.section-badge.complemento  { background:var(--complemento-bg); color:var(--complemento); border:1.5px solid var(--complemento-border); }
.section-badge.colacion      { background:var(--colacion-bg); color:var(--colacion); border:1.5px solid var(--colacion-border); }
.section-badge.comida        { background:var(--comida-bg); color:var(--comida); border:1.5px solid var(--comida-border); }
.section-badge.cena          { background:var(--cena-bg); color:var(--cena); border:1.5px solid var(--cena-border); }

.section-count {
  font-size:11px; color:var(--text-dim); font-weight:500;
}

.section-line { flex:1; height:1px; background:var(--border); }

/* Recipe grid */
.recipe-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
  gap:10px;
}

@media(min-width:480px) {
  .recipe-grid { grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); }
}

/* Recipe card */
.recipe-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:14px; padding:14px 13px;
  cursor:pointer; transition:all 0.2s;
  box-shadow:var(--shadow-sm);
  display:flex; flex-direction:column; gap:8px;
  position:relative; overflow:hidden;
}
.recipe-card::before {
  content:''; position:absolute; top:0; left:0;
  width:3px; height:100%; transition:width 0.2s;
}
.recipe-card.batido::before       { background:var(--batido); }
.recipe-card.complemento::before  { background:var(--complemento); }
.recipe-card.colacion::before      { background:var(--colacion); }
.recipe-card.comida::before        { background:var(--comida); }
.recipe-card.cena::before          { background:var(--cena); }

.recipe-card:active { transform:scale(0.97); box-shadow:none; }
.recipe-card:hover  { box-shadow:var(--shadow); border-color:var(--border-dark); }

.card-name {
  font-size:13px; font-weight:500; color:var(--text);
  line-height:1.35;
}

.card-footer {
  display:flex; align-items:center; justify-content:space-between;
}

.card-tag {
  font-size:9px; font-weight:600; letter-spacing:0.3px;
  text-transform:uppercase;
}
.card-tag.batido       { color:var(--batido); }
.card-tag.complemento  { color:var(--complemento); }
.card-tag.colacion      { color:var(--colacion); }
.card-tag.comida        { color:var(--comida); }
.card-tag.cena          { color:var(--cena); }

.card-arrow { font-size:14px; color:var(--text-dim); }

/* Empty state */
.empty-state {
  text-align:center; padding:48px 24px;
  color:var(--text-dim);
}
.empty-state .icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; line-height:1.6; }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.4);
  z-index:500; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }

.modal {
  background:var(--surface); border-radius:24px 24px 0 0;
  width:100%; max-width:600px; max-height:90vh;
  overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  transform:translateY(40px); transition:transform 0.3s ease;
  padding-bottom:40px;
}
.modal-overlay.open .modal { transform:translateY(0); }

.modal-handle {
  width:36px; height:4px; background:var(--border);
  border-radius:2px; margin:14px auto 0;
}

.modal-top {
  position:relative; padding:16px 20px 14px;
  border-bottom:1px solid var(--border);
}

.modal-cat-badge {
  display:inline-block; padding:3px 10px; border-radius:20px;
  font-size:10px; font-weight:600; letter-spacing:0.5px;
  text-transform:uppercase; margin-bottom:8px;
}
.modal-cat-badge.batido       { background:var(--batido-bg); color:var(--batido); }
.modal-cat-badge.complemento  { background:var(--complemento-bg); color:var(--complemento); }
.modal-cat-badge.colacion      { background:var(--colacion-bg); color:var(--colacion); }
.modal-cat-badge.comida        { background:var(--comida-bg); color:var(--comida); }
.modal-cat-badge.cena          { background:var(--cena-bg); color:var(--cena); }

.modal-title {
  font-family:'Cormorant Garamond',serif;
  font-size:28px; color:var(--mint); line-height:1.2;
}

.modal-close {
  position:absolute; top:16px; right:16px;
  width:34px; height:34px; border-radius:50%;
  background:var(--card); border:1px solid var(--border);
  cursor:pointer; font-size:20px; color:var(--text-mid);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; line-height:1;
}
.modal-close:active { background:var(--card); transform:scale(0.92); }

.modal-section { padding:16px 20px 0; }

.modal-section-title {
  font-size:10px; text-transform:uppercase; letter-spacing:2px;
  color:var(--text-dim); font-weight:600; margin-bottom:10px;
}

.ingredient-list { display:flex; flex-direction:column; gap:5px; }

.ingredient-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; background:var(--card); border-radius:10px;
}
.ingredient-dot {
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
}
.ingredient-dot.batido       { background:var(--batido); }
.ingredient-dot.complemento  { background:var(--complemento); }
.ingredient-dot.colacion      { background:var(--colacion); }
.ingredient-dot.comida        { background:var(--comida); }
.ingredient-dot.cena          { background:var(--cena); }

.ingredient-text { font-size:13px; color:var(--text); line-height:1.3; }

.step-list { display:flex; flex-direction:column; gap:10px; }

.step-item { display:flex; gap:12px; }

.step-num {
  width:26px; height:26px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:600; color:white; margin-top:1px;
}
.step-num.batido       { background:var(--batido); }
.step-num.complemento  { background:var(--complemento); }
.step-num.colacion      { background:var(--colacion); }
.step-num.comida        { background:var(--comida); }
.step-num.cena          { background:var(--cena); }

.step-text { font-size:13px; color:var(--text); line-height:1.55; padding-top:4px; }

/* Tip box */
.tip-box {
  margin:14px 20px 0;
  padding:12px 14px; border-radius:12px;
  background:var(--sage-light); border:1px solid #B8D8BA;
  font-size:12px; color:var(--mint); line-height:1.5;
}
.tip-box strong { display:block; margin-bottom:2px; font-size:10px; letter-spacing:1px; text-transform:uppercase; }

/* ── FLOATING COUNT ── */
.fab-count {
  position:fixed; bottom:20px; right:20px;
  background:var(--mint); color:white;
  border-radius:20px; padding:10px 16px;
  font-size:12px; font-weight:600;
  box-shadow:0 4px 16px rgba(45,94,48,0.35);
  display:none; align-items:center; gap:6px;
  z-index:200;
}
.fab-count.visible { display:flex; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="app-title">
      <span>Mis Recetas</span>
      Menú Semanal
    </div>
    <div class="header-count" id="headerCount">45 recetas</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar receta..." oninput="handleSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
  <div class="cat-tabs" id="catTabs">
    <div class="cat-tab active" data-cat="all" onclick="setCategory('all')">✨ Todas</div>
    <div class="cat-tab" data-cat="batido" onclick="setCategory('batido')">🥤 Batidos</div>
    <div class="cat-tab" data-cat="complemento" onclick="setCategory('complemento')">🍳 Complementos</div>
    <div class="cat-tab" data-cat="colacion" onclick="setCategory('colacion')">🍎 Colaciones</div>
    <div class="cat-tab" data-cat="comida" onclick="setCategory('comida')">🥗 Comidas</div>
    <div class="cat-tab" data-cat="cena" onclick="setCategory('cena')">🌙 Cenas</div>
  </div>
</div>

<div class="content" id="content"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <div class="modal-cat-badge" id="modalBadge"></div>
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Ingredientes</div>
      <div class="ingredient-list" id="modalIngredients"></div>
    </div>
    <div class="modal-section" style="margin-top:16px">
      <div class="modal-section-title">Preparación</div>
      <div class="step-list" id="modalSteps"></div>
    </div>
    <div id="modalTip"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
//  RECETAS — Agrega aquí tus nuevas recetas fácilmente
//  Formato: { id, name, cat, ingredients[], steps[], tip? }
//  Categorías: 'batido' | 'complemento' | 'colacion' | 'comida' | 'cena'
// ─────────────────────────────────────────────────────────
const RECIPES = [

  // ── BATIDOS ──────────────────────────────────────────
  { id:'b1', name:'Smoothie Verde', cat:'batido',
    ingredients:['1 tza leche de almendra','1/2 plátano','2 tzas espinaca','3 nueces'],
    steps:['Licúa todos los ingredientes hasta obtener una mezcla homogénea.','Sirve inmediatamente.'],
    tip:'Puedes agregar hielos para una textura más fría.' },

  { id:'b2', name:'Smoothie Guayaba Colada', cat:'batido',

  { id:'b4', name:'Smoothie Vainilla', cat:'batido',

    steps:['Licúa todos los ingredientes hasta lograr textura cremosa.','Sirve de inmediato.'],
    tip:'La vainilla ayuda a reducir el antojo por dulce durante el día.' },

  { id:'b5', name:'Smoothie Rosa', cat:'batido',
    ingredients:['1 tza leche de almendra','1 tza fresas','1 cda coco rallado','2 cdas amaranto natural'],
    steps:['Licúa leche, fresas y coco.','Agrega el amaranto al servir y mezcla.'] },

  { id:'b6', name:'Smoothie Invierno 25', cat:'batido',

    tip:'La canela regula la glucosa desde el primer tiempo del día.' },

  { id:'b7', name:'Jugo Verde Otoño', cat:'batido',

  { id:'b9', name:'Jugo Verde Básico', cat:'batido',

    steps:['Licúa agua, espinaca, pepino, manzana y jengibre.','Agrega el limón al final y mezcla.','Sirve de inmediato.'],
    tip:'El jengibre es antiinflamatorio y activa el metabolismo.' },

  { id:'b10', name:'Jugo Verde Claro', cat:'batido',
    ingredients:['1 tza agua','1/4 tza uvas verdes','2 tzas espinaca','hojas de menta al gusto'],
    steps:['Licúa todos los ingredientes.','Sirve frío sin colar.'] },

  // ── COMPLEMENTOS ─────────────────────────────────────
  { id:'c1', name:'Wrapp Primavera', cat:'complemento',

  { id:'c7', name:'Sándwich Grill', cat:'complemento',

// ─────────────────────────────────────────────────────────
//  CONFIGURACIÓN DE CATEGORÍAS
// ─────────────────────────────────────────────────────────
const CATS = {
  batido:      { label:'🥤 Batidos & Jugos',  emoji:'🥤' },
  complemento: { label:'🍳 Complementos',      emoji:'🍳' },
  colacion:    { label:'🍎 Colaciones',         emoji:'🍎' },
  comida:      { label:'🥗 Comidas',            emoji:'🥗' },
  cena:        { label:'🌙 Cenas',              emoji:'🌙' },
};

// ─────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────
let activeCategory = 'all';
let searchTerm = '';

// ─────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────
function render() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const filtered = RECIPES.filter(r => {
    const matchCat = activeCategory === 'all' || r.cat === activeCategory;
    const matchSearch = r.name.toLowerCase().includes(searchTerm) ||
                        r.ingredients.some(i => i.toLowerCase().includes(searchTerm));
    return matchCat && matchSearch;
  });

  document.getElementById('headerCount').textContent = filtered.length + ' recetas';

  if (filtered.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No encontramos recetas para "<strong>${searchTerm}</strong>".<br>Intenta con otro término.</p></div>`;
    return;
  }

  const catsToShow = activeCategory === 'all'
    ? Object.keys(CATS)
    : [activeCategory];

  catsToShow.forEach(cat => {
    const recipes = filtered.filter(r => r.cat === cat);
    if (recipes.length === 0) return;

    // Section header
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <div class="section-badge ${cat}">${CATS[cat].label}</div>
      <div class="section-count">${recipes.length}</div>
      <div class="section-line"></div>`;
    content.appendChild(header);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'recipe-grid';

    recipes.forEach(recipe => {
      const card = document.createElement('div');
      card.className = `recipe-card ${recipe.cat}`;
      card.innerHTML = `
        <div class="card-name">${recipe.name}</div>
        <div class="card-footer">
          <div class="card-tag ${recipe.cat}">${recipe.ingredients.length} ingredientes</div>
          <div class="card-arrow">›</div>
        </div>`;
      card.onclick = () => openModal(recipe.id);
      grid.appendChild(card);
    });

    content.appendChild(grid);
  });
}

// ─────────────────────────────────────────────────────────
//  CATEGORY FILTER
// ─────────────────────────────────────────────────────────
function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.cat === cat);
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────────────────
function handleSearch(val) {
  searchTerm = val.toLowerCase().trim();
  document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  searchTerm = '';
  render();
}

// ─────────────────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────────────────
function openModal(recipeId) {
  const recipe = RECIPES.find(r => r.id === recipeId);
  if (!recipe) return;

  document.getElementById('modalBadge').textContent = CATS[recipe.cat].label;
  document.getElementById('modalBadge').className = `modal-cat-badge ${recipe.cat}`;
  document.getElementById('modalTitle').textContent = recipe.name;

  document.getElementById('modalIngredients').innerHTML = recipe.ingredients
    .map(ing => `<div class="ingredient-item"><div class="ingredient-dot ${recipe.cat}"></div><div class="ingredient-text">${ing}</div></div>`)
    .join('');

  document.getElementById('modalSteps').innerHTML = recipe.steps
    .map((s, i) => `<div class="step-item"><div class="step-num ${recipe.cat}">${i + 1}</div><div class="step-text">${s}</div></div>`)
    .join('');

  const tipEl = document.getElementById('modalTip');
  if (recipe.tip) {
    tipEl.innerHTML = `<div class="tip-box"><strong>💡 Por qué es buena para ti</strong>${recipe.tip}</div>`;
  } else {
    tipEl.innerHTML = '';
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// Close on swipe down
let touchStartY = 0;
document.getElementById('modal').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
document.getElementById('modal').addEventListener('touchmove', e => {
  const modal = document.getElementById('modal');
  if (modal.scrollTop === 0 && e.touches[0].clientY - touchStartY > 60) closeModal();
}, { passive: true });

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
render();
</script>
